<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Cafebas</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="style_mobile.css">
    </head>
    <body>
        <div id="menu-hover">
            <div id="menu">
                <div class="center">
                    <div>
                        <button id="fullscreen-toggle">■</button>

                        <label class="toggle-container">
                            <input type="checkbox" class="toggle-input">
                            <div class="toggle-track">
                                <span class="label-left">Page</span>
                                <span class="label-right">Panneau</span>
                                <div class="toggle-thumb"></div>
                            </div>
                        </label>
                    </div>  

                    <div class="together">
                        <button onclick="this.parentNode.querySelector('#chapter').stepDown()">◀</button>
                        <label>Chapitre
                            <input id="chapter" type="number" min="1" max="2" value="1">
                            sur <span id="number_of_chapters">2</span>
                        </label>
                        <button onclick="this.parentNode.querySelector('#chapter').stepUp()">▶</button>
                    </div>

                    <a id="download" href="/content/chap1/chap1.pdf" download>
                        <img src="icons/download-pdf-icon.png" alt="PDF" width="32" height="32" style="filter: invert(100%);">
                        PDF
                    </a>
                </div>
            </div>
        </div>
            <div id="scroll">
        </div>
    </body>
</html>
<script type="module" src="shortcut.js"></script>
<script type="module" src="view.js"></script>
<script type="module" src="fullscreen.js"></script>
